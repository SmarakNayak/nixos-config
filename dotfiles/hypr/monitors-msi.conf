################
### MONITORS ###
################

# msi-laptop — static internal panel + generic fallback for any external display
# See https://wiki.hyprland.org/Configuring/Monitors/
# Internal display: explicit name/mode/refresh so it never falls back to a
# wrong "preferred" mode. Native panel is 1920x1080@144Hz.
monitor = eDP-1, 1920x1080@144, auto, 1

# Generic fallback: any other connected display (HDMI/DP/USB-C) gets a sane
# default placed automatically. Remove or replace if you want a fixed layout.
monitor = , preferred, auto, 1

###################
### WORKSPACES  ###
###################

# 5 persistent workspaces bound to the default display (no monitor: binding so
# this works whether you're on the laptop panel or an external screen).
workspace = 1, persistent:true, default:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
